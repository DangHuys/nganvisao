<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToanTitan Network</title>
    <style>
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); padding: 35px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .btn-connect { width: 100%; padding: 12px; background: #f57a0a; border: none; border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Đăng Ký Truy Cập</h2>
        <form id="marketingForm">
            <input type="text" id="txtHoTen" placeholder="Họ và tên" class="input-field" required>
            <input type="tel" id="txtSdt" placeholder="Số điện thoại" class="input-field" required>
            <button type="submit" class="btn-connect" id="btnSubmit">Kết nối Internet</button>
        </form>
    </div>

    <script>
        const GOOGLE_APP_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';

        document.getElementById('marketingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Đang kết nối...";

            // 1. Gửi data về Sheet
            fetch(GOOGLE_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    hoTen: document.getElementById('txtHoTen').value,
                    sdt: document.getElementById('txtSdt').value
                })
            });

            // 2. Gửi tín hiệu về Router
            window.parent.postMessage({
                action: "login_request",
                params: { username: "wificongdong", password: "123" }
            }, "*");
        });
    </script>
</body>
</html>
