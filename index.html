<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hanet Network</title>
    <style>
        body, html { margin:0; padding:0; height:100%; display:flex; justify-content:center; align-items:center; background:#0f172a; }
        .bg-slider { position:fixed; width:100%; height:100%; z-index:-1; }
        .bg-slider img { position:absolute; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1s; }
        .bg-slider img.active { opacity:1; }
        .card { background:rgba(15,23,42,0.8); padding:30px; border-radius:20px; text-align:center; width:90%; max-width:400px; }
        .input-field { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; box-sizing:border-box; }
        .btn { width:100%; padding:12px; background:#f57a0a; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <div class="bg-slider" id="slider">
        <img src="pic1.jpg" class="active">
        <img src="pic2.jpg">
        <img src="pic3.jpg">
        <img src="pic4.jpg">
        <img src="pic5.jpg">
    </div>

    <div class="card" id="formContainer">
        <h2>Đăng Ký Truy Cập</h2>
        <form id="myForm">
            <input type="text" id="hoTen" class="input-field" placeholder="Họ và tên" required>
            <input type="tel" id="sdt" class="input-field" placeholder="Số điện thoại" required>
            <button type="submit" class="btn" id="btnSubmit">Kết nối Internet</button>
        </form>
    </div>

    <script>
        // TỰ ĐỘNG CHUYỂN ẢNH
        let current = 0;
        const slides = document.querySelectorAll('.bg-slider img');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 3000);

        // GỬI FORM VÀ CHUYỂN TRANG
        const GOOGLE_APP_URL = 'AKfycbxQX6z7kcdN8a7Kv01Q5N7bVmxqrf7Aa9qLR6hRM5f45a-AYpArZpqq7yNzL8gmNubH';

        document.getElementById('myForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Đang kết nối...";
            
            fetch(GOOGLE_APP_URL, {
                method: 'POST', mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    hoTen: document.getElementById('hoTen').value,
                    sdt: document.getElementById('sdt').value
                })
            }).then(() => {
                // Sau khi gửi thành công -> Thông báo và chuyển hướng
                alert("Đã kết nối thành công!");
                window.location.href = "https://hanet.com";
            });
        });
    </script>
</body>
</html>
